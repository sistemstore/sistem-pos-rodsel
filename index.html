<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Autentikasi POS Stok RodSel</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #e2e8f0; color: #333; padding: 20px; }
        .auth-container { background-color: #ffffff; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); width: 100%; max-width: 450px; overflow: hidden; }
        .auth-header { display: flex; border-bottom: 1px solid #e2e8f0; }
        .tab-btn { flex: 1; padding: 20px; background: none; border: none; font-size: 16px; font-weight: 600; color: #64748b; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn:hover { color: #0f172a; }
        .tab-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; background-color: #f8fafc; }
        .form-area { padding: 30px 40px; }
        .form-content { display: none; animation: fadeIn 0.4s; }
        .form-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .form-content h2 { margin-bottom: 25px; text-align: center; color: #0f172a; }
        
        .row { display: flex; gap: 15px; }
        .row .input-group { flex: 1; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 500; color: #475569; }
        .input-group input, .input-group select { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; outline: none; transition: border-color 0.3s; background-color: #fff; }
        .input-group input:focus, .input-group select:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        .profile-upload-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .profile-preview { width: 100px; height: 100px; border-radius: 50%; background-color: #f1f5f9; border: 2px dashed #cbd5e1; display: flex; justify-content: center; align-items: center; margin-bottom: 10px; overflow: hidden; background-size: cover; background-position: center; color: #94a3b8; font-size: 24px; }
        .upload-label { color: #2563eb; font-size: 14px; font-weight: 500; cursor: pointer; }
        
        .submit-btn { width: 100%; padding: 14px; background-color: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        .submit-btn:hover { background-color: #1d4ed8; }
        .submit-btn:disabled { background-color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-header">
            <button class="tab-btn active" id="btn-login-tab">Masuk</button>
            <button class="tab-btn" id="btn-register-tab">Daftar</button>
        </div>

        <div class="form-area">
            <div id="form-login" class="form-content active">
                <h2>Selamat Datang</h2>
                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="login-email" placeholder="nama@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Kata Sandi</label>
                        <input type="password" id="login-password" placeholder="Masukkan kata sandi" required>
                    </div>
                    <button type="submit" class="submit-btn" id="btn-login-submit">Masuk</button>
                </form>
            </div>

            <div id="form-register" class="form-content">
                <h2>Registrasi Pegawai</h2>
                <form id="registerForm">
                    <div class="profile-upload-container">
                        <div class="profile-preview" id="profilePreview"><span>📷</span></div>
                        <label for="reg-photo" class="upload-label">Unggah Foto (Opsional)</label>
                        <input type="file" id="reg-photo" accept="image/*" style="display: none;">
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Nama Depan</label>
                            <input type="text" id="reg-first-name" required>
                        </div>
                        <div class="input-group">
                            <label>Nama Belakang</label>
                            <input type="text" id="reg-last-name" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Jabatan</label>
                        <select id="reg-role" required>
                            <option value="" disabled selected>-- Pilih Jabatan --</option>
                            <option value="owner">Owner</option>
                            <option value="admin">Admin</option>
                            <option value="kasir">Kasir</option>
                            <option value="sales">Sales</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="reg-email" required>
                    </div>
                    <div class="input-group">
                        <label>Kata Sandi</label>
                        <input type="password" id="reg-password" required minlength="6">
                    </div>
                    
                    <button type="submit" class="submit-btn" id="btn-register-submit">Daftar Sekarang</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-storage.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCmqxTwUsNGfQCkbnUThokntNWmWWxZZeE",
            authDomain: "rodsel-pos-online.firebaseapp.com",
            projectId: "rodsel-pos-online",
            storageBucket: "rodsel-pos-online.firebasestorage.app",
            messagingSenderId: "607558554103",
            appId: "1:607558554103:web:0e06eaf5eb7d9d9eca9ef2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app); 

        // Navigasi Tab
        const btnLoginTab = document.getElementById('btn-login-tab');
        const btnRegisterTab = document.getElementById('btn-register-tab');
        const formLogin = document.getElementById('form-login');
        const formRegister = document.getElementById('form-register');

        function switchTab(tabId) {
            btnLoginTab.classList.remove('active');
            btnRegisterTab.classList.remove('active');
            formLogin.classList.remove('active');
            formRegister.classList.remove('active');

            if (tabId === 'login') {
                btnLoginTab.classList.add('active');
                formLogin.classList.add('active');
            } else {
                btnRegisterTab.classList.add('active');
                formRegister.classList.add('active');
            }
        }

        btnLoginTab.addEventListener('click', () => switchTab('login'));
        btnRegisterTab.addEventListener('click', () => switchTab('register'));

        // Preview Foto
        document.getElementById('reg-photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const preview = document.getElementById('profilePreview');
                    preview.style.backgroundImage = `url(${e.target.result})`;
                    preview.innerHTML = ''; 
                }
                reader.readAsDataURL(file);
            }
        });

        // =====================================
        // FUNGSI REGISTRASI (DIPERBAIKI)
        // =====================================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-register-submit');
            
            try {
                btnSubmit.disabled = true;
                btnSubmit.innerText = "Memproses Pendaftaran...";

                const firstName = document.getElementById('reg-first-name').value;
                const lastName = document.getElementById('reg-last-name').value;
                const role = document.getElementById('reg-role').value;
                const email = document.getElementById('reg-email').value;
                const password = document.getElementById('reg-password').value;
                const photoFile = document.getElementById('reg-photo').files[0];

                // 1. Buat Akun
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. Upload Foto (Bisa di-skip jika gagal agar tidak macet)
                let photoURL = "";
                if (photoFile) {
                    try {
                        const imageRef = storageRef(storage, `profile_pictures/${user.uid}`);
                        await uploadBytes(imageRef, photoFile);
                        photoURL = await getDownloadURL(imageRef);
                    } catch (uploadError) {
                        console.warn("Upload foto gagal, lanjut tanpa foto.");
                    }
                }

                // 3. Simpan ke Firestore (Diberi Batas Waktu 10 Detik)
                const simpanKeDB = setDoc(doc(db, "users", user.uid), {
                    nama: firstName + " " + lastName, 
                    namaDepan: firstName,
                    namaBelakang: lastName,
                    email: email,
                    role: role.toLowerCase().trim(),
                    photoURL: photoURL,
                    tanggalDaftar: new Date()
                });

                const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout Firestore")), 10000));
                
                await Promise.race([simpanKeDB, timeout]); // Menunggu mana yang lebih dulu selesai

                // 4. Jika Sukses, Reset Form & Pindah ke Halaman Login
                Swal.fire({ icon: 'success', title: 'Pendaftaran Berhasil!', text: 'Silakan masuk menggunakan akun Anda.', timer: 2500, showConfirmButton: false });
                
                document.getElementById('registerForm').reset();
                document.getElementById('profilePreview').style.backgroundImage = 'none';
                document.getElementById('profilePreview').innerHTML = '<span>📷</span>';
                
                // Pindah ke Tab Login
                setTimeout(() => { switchTab('login'); }, 1500);

            } catch (error) {
                console.error("Error Registrasi:", error);
                let pesanError = error.message;
                
                if (error.code === 'auth/email-already-in-use') {
                    pesanError = "Email ini sudah pernah didaftarkan. Silakan langsung login.";
                } else if (error.code === 'permission-denied') {
                    pesanError = "Gagal menyimpan profil. Aturan Database Firebase Anda belum diizinkan.";
                } else if (error.message === "Timeout Firestore") {
                    pesanError = "Koneksi ke Database sangat lambat atau Firestore belum dibuat.";
                }
                
                Swal.fire('Pendaftaran Gagal', pesanError, 'error');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Daftar Sekarang";
            }
        });

        // =====================================
        // FUNGSI LOGIN / MASUK (DIPERBAIKI)
        // =====================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btnSubmit = document.getElementById('btn-login-submit');

            try {
                btnSubmit.disabled = true;
                btnSubmit.innerText = "Memeriksa kredensial...";

                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                // 1. Verifikasi Email & Password
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;
                
                // 2. Ambil data jabatan dengan batas waktu 10 detik
                const ambilDariDB = getDoc(doc(db, "users", user.uid));
                const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout Firestore")), 10000));
                
                const docSnap = await Promise.race([ambilDariDB, timeout]);
                
                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    const userRole = (userData.role || "").toLowerCase().trim();
                    
                    Swal.fire({ icon: 'success', title: 'Berhasil Masuk!', showConfirmButton: false, timer: 1000 });

                    // 3. Routing ke Dashboard Masing-Masing
                    setTimeout(() => {
                        if (userRole === 'owner') {
                            window.location.replace('dashboard-owner.html');
                        } else if (userRole === 'admin') {
                            window.location.replace('dashboard-admin.html');
                        } else if (userRole === 'kasir' || userRole === 'sales') {
                            window.location.replace('dashboard-kasir-sales.html');
                        } else {
                            Swal.fire('Error', 'Jabatan Anda tidak dikenali.', 'error');
                        }
                    }, 1000);

                } else {
                    Swal.fire('Oops!', 'Pendaftaran belum sempurna. Data profil tidak ada di Database.', 'error');
                }

            } catch (error) {
                console.error("Error Login:", error);
                let pesanLoginError = "Terjadi kesalahan sistem.";
                
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                    pesanLoginError = "Email atau Kata Sandi salah!";
                } else if (error.message === "Timeout Firestore") {
                    pesanLoginError = "Gagal mengambil data. Cek koneksi Anda.";
                } else if (error.code === 'permission-denied') {
                    pesanLoginError = "Akses membaca data ditolak (Permission Denied).";
                }
                
                Swal.fire('Masuk Gagal', pesanLoginError, 'error');
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Masuk";
            }
        });
    </script>
</body>
</html>
